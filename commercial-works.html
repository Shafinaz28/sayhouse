<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commercial Works | SayHomes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root{--navy:#0F1B2D;--primary:#1A3C6E;--cream:#FAF7F2;--gold:#C9A84C;--muted:#7A7269}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:#2c2c2c}
    .page-hero{position:relative;height:260px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .page-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
    .page-hero:after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,20,35,.72),rgba(10,20,35,.58))}
    .page-hero-inner{position:relative;z-index:2;text-align:center;padding:0 20px}
    .page-hero-inner h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:300;color:#fff}
    .page-hero-inner h1 em{color:var(--gold);font-style:italic}
    .breadcrumb{display:flex;justify-content:center;gap:8px;margin-top:12px;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;flex-wrap:wrap}
    .breadcrumb a{color:rgba(255,255,255,.6);text-decoration:none}
    .breadcrumb span{color:var(--gold)}
    .section{padding:72px 28px}
    .inner{max-width:1200px;margin:0 auto}
    .title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;text-align:center;color:var(--navy);margin-bottom:10px}
    .subtitle{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:28px}
    .banners{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .card{position:relative;height:220px;overflow:hidden;cursor:pointer;text-decoration:none;border-radius:8px}
    .card img{width:100%;height:100%;object-fit:contain;transition:transform .45s ease}
    .card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),rgba(0,0,0,.15))}
    .card:hover img{transform:scale(1.06)}
    .card h3{position:absolute;left:14px;right:14px;bottom:10px;z-index:2;color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.45rem;line-height:1.05;text-align:center}
    @media(max-width:1024px){.banners{grid-template-columns:1fr 1fr}}
    @media(max-width:640px){.section{padding:54px 16px}.banners{grid-template-columns:1fr}.card{height:190px}.page-hero{height:210px}}
  </style>
</head>
<body>
  <div class="page-hero">
    <img src="commercial/GSK%20Conventional%20Hall,%20Chikkaballapura.jpg" alt="Commercial Projects">
    <div class="page-hero-inner">
      <h1 id="heroTitle">Commercial <em>Works</em></h1>
      <div class="breadcrumb">
        <a href="CommercialProjects.html">Commercial Projects</a>
        <span>/</span>
        <span id="breadcrumbSector">Works</span>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="inner">
      <h2 class="title" id="sectionTitle">Our Works</h2>
      <p class="subtitle" id="sectionSubtitle"></p>
      <div class="banners" id="projectBanners"></div>
    </div>
  </section>

  <script src="js/commercial-sectors.js"></script>
  <script>
    const sectorId = new URLSearchParams(window.location.search).get('sector') || 'institutions';
    const sector = SayHomesCommercial.SECTORS[sectorId] || SayHomesCommercial.SECTORS.institutions;
    const items = SayHomesCommercial.sectorProjects(sectorId);

    document.getElementById('heroTitle').innerHTML = sector.title + ' <em>Works</em>';
    document.getElementById('breadcrumbSector').textContent = sector.title;
    document.getElementById('sectionTitle').textContent = sector.title;
    document.getElementById('sectionSubtitle').textContent = sector.subtitle;

    document.getElementById('projectBanners').innerHTML = items
      .map(
        (item) => `
      <a class="card" href="commercial-work-detail.html?project=${encodeURIComponent(item.key)}&sector=${encodeURIComponent(sectorId)}">
        <img src="${item.cover}" alt="${item.name}">
        <h3>${item.name}</h3>
      </a>`
      )
      .join('');
  </script>
</body>
</html>
