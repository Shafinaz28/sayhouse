<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commercial Works | SayHomes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root{--navy:#0F1B2D;--primary:#1A3C6E;--cream:#FAF7F2;--light:#F0EBE3;--gold:#C9A84C;--logo-blue:#0047AB;--logo-red:#E31837;--logo-blue-on-dark:#93B9E8}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:#2c2c2c}
    .page-hero{position:relative;height:260px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .page-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .page-hero:after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,20,35,.72),rgba(10,20,35,.58))}
    .page-hero-inner{position:relative;z-index:2;text-align:center;padding:0 20px}
    .page-hero-inner h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:300;color:#fff}
    .page-hero-inner h1 em{color:var(--gold);font-style:italic}
    .section{padding:72px 28px}
    .inner{max-width:1200px;margin:0 auto}
    .title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;text-align:center;color:var(--navy);margin-bottom:28px}
    .banners{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .card{position:relative;height:220px;overflow:hidden;cursor:pointer;text-decoration:none}
    .card img{width:100%;height:100%;object-fit:cover}
    .card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),rgba(0,0,0,.15))}
    .card h3{position:absolute;left:14px;right:14px;bottom:10px;z-index:2;color:#fff;font-family:'Cormorant Garamond',serif;font-size:2rem;line-height:.95;text-align:center}
    @media(max-width:1024px){.banners{grid-template-columns:1fr 1fr}}
    @media(max-width:640px){.section{padding:54px 16px}.banners{grid-template-columns:1fr}.card{height:190px}.page-hero{height:210px}}
  </style>
</head>
<body>
  <div class="page-hero">
    <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1600&q=80" alt="Commercial Projects">
    <div class="page-hero-inner">
      <h1>Commercial <em>Projects</em></h1>
    </div>
  </div>
  <section class="section">
    <div class="inner">
      <h2 class="title">Commercial Works</h2>
      <div class="banners" id="institutionBanners"></div>
    </div>
  </section>

  <script>
    const institutions = [
      { key:"capstone", name: "Capstone High - Hoskote", cover: "commercial/lisg1.jpg" },
      { key:"beverly", name: "Sammy's Beverly Hills", cover: "commercial/lisg2.jpg" },
      { key:"rak", name: "RAK Felicity (Vencer)", cover: "commercial/IMA%20CENTRAL%20Elevation.jpg" }
    ];
    const bannersEl = document.getElementById('institutionBanners');
    bannersEl.innerHTML = institutions.map((item, idx) => `
      <a class="card" href="commercial-work-detail.html?project=${item.key}">
        <img src="${item.cover}" alt="${item.name}">
        <h3>${item.name}</h3>
      </a>
    `).join('');
  </script>
</body>
</html>
