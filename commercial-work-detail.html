<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commercial Work Detail | SayHomes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0F1B2D;--primary:#1A3C6E;--cream:#FAF7F2;--light:#F0EBE3;--gold:#C9A84C}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:#2c2c2c}
    .back-link{display:inline-flex;align-items:center;gap:8px;margin:0 auto 24px;color:var(--primary);text-decoration:none;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
    .section{padding:70px 24px}
    .inner{max-width:980px;margin:0 auto}
    .title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.5rem);text-align:center;color:var(--navy);line-height:1.15;margin-bottom:20px}
    .viewer-main-frame{width:100%;height:min(480px,52vh);min-height:280px;background:#e8e8e8;overflow:hidden;border-radius:6px;margin-bottom:12px}
    .main-image{width:100%;height:100%;object-fit:contain;object-position:center;display:block;cursor:zoom-in}
    .thumbs{display:flex;justify-content:center;flex-wrap:nowrap;gap:10px;overflow-x:auto;padding:4px 4px 28px;scrollbar-width:thin}
    .thumb{border:2px solid transparent;border-radius:4px;overflow:hidden;background:#fff;cursor:pointer;flex:0 0 auto;padding:0}
    .thumb.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
    .thumb img{width:88px;height:58px;object-fit:contain;display:block}
    .label{display:block;text-align:center;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#7a7269;margin:8px 0 12px}
    .video-box{aspect-ratio:16/9;background:#1a1a1a;border-radius:6px;overflow:hidden}
    .video-box iframe{width:100%;height:100%;border:0}
    @media(max-width:900px){.viewer-main-frame{height:min(320px,45vh);min-height:220px}.thumb img{width:72px;height:48px}}
  </style>
</head>
<body>
  <section class="section">
    <div class="inner">
      <a class="back-link" id="backLink" href="commercial-works.html">← Back to works</a>
      <h1 class="title" id="projectTitle">Project</h1>
      <section class="viewer-main-frame">
        <img class="main-image" id="mainImage" src="" alt="" role="button" tabindex="0" title="View image">
      </section>
      <div class="thumbs" id="thumbs"></div>
      <span class="label">Video</span>
      <div class="video-box"><iframe id="videoFrame" src="" title="Project video" allowfullscreen loading="lazy"></iframe></div>
    </div>
  </section>

  <script src="js/commercial-sectors.js"></script>
  <script>
    const key = new URLSearchParams(window.location.search).get('project') || 'leaders';
    const sector = new URLSearchParams(window.location.search).get('sector') || '';
    const p = SayHomesCommercial.getProject(key) || SayHomesCommercial.getProject('leaders');

    document.getElementById('projectTitle').textContent = p.name;
    document.getElementById('videoFrame').src = p.video || '';

    const back = document.getElementById('backLink');
    if (sector && SayHomesCommercial.SECTORS[sector]) {
      back.href = 'commercial-works.html?sector=' + encodeURIComponent(sector);
      back.textContent = '← Back to ' + SayHomesCommercial.SECTORS[sector].title;
    }

    const mainImage = document.getElementById('mainImage');
    const thumbs = document.getElementById('thumbs');
    let idx = 0;
    let t = null;

    function render() {
      mainImage.src = p.images[idx];
      mainImage.alt = p.name + ' — photo ' + (idx + 1);
      thumbs.querySelectorAll('.thumb').forEach((el, i) => el.classList.toggle('active', i === idx));
    }

    function start() {
      if (t) clearInterval(t);
      if (p.images.length <= 1) return;
      t = setInterval(() => {
        idx = (idx + 1) % p.images.length;
        render();
      }, 2600);
    }

    thumbs.innerHTML = p.images
      .map(
        (src, i) =>
          `<button class="thumb${i === 0 ? ' active' : ''}" type="button" data-i="${i}"><img src="${src}" alt="${p.name} ${i + 1}" loading="lazy"></button>`
      )
      .join('');

    thumbs.querySelectorAll('.thumb').forEach((btn) => {
      btn.addEventListener('click', () => {
        idx = Number(btn.dataset.i || 0);
        render();
        start();
      });
    });

    render();
    start();
  </script>
</body>
</html>
